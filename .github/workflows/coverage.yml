name: Coverage

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 1'

jobs:
  coverage:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gnat gprbuild libaunit22-dev
          # gnatcov may come from non-default repositories on some systems.
          if apt-cache search '^gnatcov$' | grep -q gnatcov; then
            sudo apt-get install -y gnatcov
          fi
      - name: Run coverage (requires gnatcov)
        run: tools/run_coverage.sh
