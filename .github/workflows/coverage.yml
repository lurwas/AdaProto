name: Coverage

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 1'

jobs:
  coverage:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          AUNIT=$(apt-cache search --names-only libaunit | awk '$1 ~ /-dev$/ {print $1}' | sort -V | tail -n1)
          echo "Selected AUnit dev package: ${AUNIT:?no libaunit*-dev package found}"
          sudo apt-get install -y gnat gprbuild "$AUNIT"
          # gnatcov may come from non-default repositories on some systems.
          if apt-cache search '^gnatcov$' | grep -q gnatcov; then
            sudo apt-get install -y gnatcov
          fi
      - name: Run coverage (requires gnatcov)
        run: tools/run_coverage.sh
