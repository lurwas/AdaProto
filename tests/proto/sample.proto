syntax = "proto3";

package sample;

import "google/protobuf/wrappers.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

// Phase 3: well-known type fields, wired through the generator to Proto_WKT.
message Box {
  google.protobuf.Int32Value         count = 1;
  google.protobuf.Duration           dur   = 2;
  google.protobuf.Timestamp          at    = 3;
  repeated google.protobuf.StringValue tags = 4;
}

// Exercises the Phase 1a code generator: singular scalar fields of every
// supported wire category.
message Person {
  int32  id      = 1;
  string name    = 2;
  bool   active  = 3;
  double balance = 4;
  sint64 delta   = 5;
  bytes  blob    = 6;
}

message Pair {
  uint32 first  = 1;
  uint32 second = 2;
}

enum Color {
  COLOR_UNSPECIFIED = 0;
  RED               = 1;
  GREEN             = 2;
  BLUE              = 3;
}

// Exercises Phase 1b: enums plus repeated packed scalars and repeated strings.
message Bag {
  repeated int32  numbers = 1;
  repeated string tags    = 2;
  Color           color   = 3;
  repeated Color  palette = 4;
}

// Phase 1c: nested (non-recursive) message fields. Outer is declared BEFORE
// Inner on purpose, to exercise topological ordering of generated types.
message Outer {
  Inner          one  = 1;
  repeated Inner many = 2;
  string         note = 3;
}

message Inner {
  int32  x     = 1;
  string label = 2;
}

// Phase 1c: a recursive message (self-referential, singular + repeated).
message Tree {
  int32         value    = 1;
  Tree          left     = 2;
  Tree          right    = 3;
  repeated Tree children = 4;
}

// Phase 1c: maps with a scalar value and with a message value; plus maps whose
// value is a well-known type (stored as a holder, like a message value, and
// (de)serialized / JSON-mapped through Proto_WKT).
message Maps {
  map<string, int32> counts = 1;
  map<int32, Inner>  items  = 2;
  map<string, google.protobuf.Int32Value> wrapped = 3;
  map<int32,  google.protobuf.Timestamp>  stamps  = 4;
}

// Nested type definitions: a message and an enum declared inside another
// message, plus corecursion (a nested message that refers back to its
// enclosing type) and a sibling reference resolved by proto's scope rules.
message Nest {
  message Item {
    int32 a      = 1;
    Nest  parent = 2;   // corecursive: refers to the enclosing message
    Kind  kind   = 3;   // sibling nested enum, resolved outward
  }
  enum Kind {
    KIND_UNKNOWN = 0;
    KIND_LEAF    = 1;
    KIND_NODE    = 2;
  }
  Item              head    = 1;   // singular nested message
  repeated Item     items   = 2;   // repeated nested message
  Kind              kind    = 3;   // nested enum field
  map<string, Item> by_name = 4;   // nested message as a map value
}

// proto3 `optional`: explicit-presence scalars. `maybe` set to its default
// value (0) is still emitted/present; an absent `maybe` is omitted. `plain`
// keeps no-presence (implicit) semantics for contrast.
message Opt {
  optional int32  maybe = 1;
  optional string note  = 2;
  int32           plain = 3;
}

// Phase 1c: a oneof with scalar, string, and message members.
message Choice {
  string before = 1;
  oneof pick {
    int32  count = 2;
    string text  = 3;
    Inner  inner = 4;
    google.protobuf.Int32Value wrap = 6;  // WKT as a oneof member
  }
  bool after = 5;
}
