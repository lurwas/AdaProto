syntax = "proto3";

package conformance_test;

// A self-contained test message covering the field shapes the generator
// supports, used to exercise the conformance harness end-to-end (the official
// suite's TestAllTypesProto3 additionally needs nested type definitions and
// proto3 `optional`, which are future generator work).

enum Color {
  C_UNKNOWN = 0;
  C_RED     = 1;
  C_GREEN   = 2;
}

message TestMessage {
  int32           i32   = 1;
  int64           i64   = 2;
  bool            b     = 3;
  string          s     = 4;
  bytes           by    = 5;
  double          d     = 6;
  Color           color = 7;
  repeated int32  nums  = 8;
  repeated string strs  = 9;
  oneof choice {
    int32  ci = 10;
    string cs = 11;
  }
  map<string, int32> counts = 12;
}
