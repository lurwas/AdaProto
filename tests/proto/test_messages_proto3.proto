import "google/protobuf/field_mask.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

// A faithful subset of Google's conformance message
// protobuf_test_messages.proto3.TestAllTypesProto3 -- same package, message
// name, and canonical field numbers, covering every construct this generator
// and runtime support: all scalar types, nested/foreign messages and enums,
// recursion and corecursion, repeated and packed-repeated fields, maps over the
// full range of key/value shapes, a oneof, and the well-known types.
//
// Deliberately omitted (constructs the generator does not yet model, so that
// the testee answers correctly for what it claims rather than silently mangling
// the rest): the explicit [packed=false] "unpacked_*" repeats (this generator
// always packs) and the JSON field-name edge-case fields. Those conformance
// cases remain reported as failures until the corresponding features land.

enum ForeignEnum {
  FOREIGN_FOO = 0;
  FOREIGN_BAR = 1;
  FOREIGN_BAZ = 2;
}

message ForeignMessage {
  int32 c = 1;
}

message TestAllTypesProto3 {
  message NestedMessage {
    int32              a          = 1;
    TestAllTypesProto3 corecursive = 2;
  }

  enum NestedEnum {
    FOO = 0;
    BAR = 1;
    BAZ = 2;
    NEG = -1;
  }

  // Singular scalars.
  int32    optional_int32    = 1;
  int64    optional_int64    = 2;
  uint32   optional_uint32   = 3;
  uint64   optional_uint64   = 4;
  sint32   optional_sint32   = 5;
  sint64   optional_sint64   = 6;
  fixed32  optional_fixed32  = 7;
